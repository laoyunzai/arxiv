name: Daily arXiv Digest

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/fetch_arxiv.py --config config/topics.yaml --output docs/index.md --json-output docs/data/latest.json

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain docs/index.md docs/data/latest.json docs/data/summary_cache.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/index.md docs/data/latest.json docs/data/summary_cache.json
            git commit -m "chore: update arxiv digest $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
